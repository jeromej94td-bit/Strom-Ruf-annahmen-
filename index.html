<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Dokument digital unterschreiben</title>
<script src="vendor/pdf-lib.min.js"></script>
<style>
*{box-sizing:border-box}body{margin:0;min-height:100vh;background:linear-gradient(145deg,#e9f7ed,#f8fbf9);font-family:Arial,sans-serif;color:#18302a}.app{width:min(760px,100%);margin:auto;padding:24px 16px 60px}.brand{display:flex;gap:12px;align-items:center;margin-bottom:20px}.logo{width:46px;height:46px;border-radius:14px;background:#16a34a;color:white;display:grid;place-items:center;font-size:24px}h1{margin:0;font-size:30px}.lead,.hint{color:#65736f;line-height:1.5}.card{background:white;border:1px solid #d9e7dd;border-radius:22px;padding:24px;box-shadow:0 18px 50px rgba(20,74,44,.1)}.screen{display:none}.screen.active{display:block}.types{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.type{border:1px solid #d9e7dd;background:#fbfdfb;border-radius:14px;padding:16px;cursor:pointer}.type.selected{border:2px solid #16a34a;background:#effaf2}.upload{margin-top:18px;padding:18px;border:2px dashed #bcd8c5;border-radius:14px;background:#f8fcf9}.upload input{width:100%}.actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}.btn{border:0;border-radius:12px;padding:13px 18px;font-weight:700;cursor:pointer}.primary{background:#16a34a;color:white}.secondary{background:#edf4ef}.danger{background:#fff0ee;color:#b42318}.btn:disabled{opacity:.4}.signbox{border:1px solid #d9e7dd;border-radius:14px;overflow:hidden}canvas{display:block;width:100%;height:260px;touch-action:none;background:white}.status{margin-top:14px;min-height:22px;color:#b42318}.done{color:#15803d}.busy{display:none;position:fixed;inset:0;background:rgba(255,255,255,.88);place-items:center}.busy.show{display:grid}@media(max-width:650px){.types{grid-template-columns:1fr}.actions{flex-direction:column}.btn{width:100%}}
</style>
</head>
<body>
<main class="app">
<div class="brand"><div class="logo">✓</div><div><h1>Dokument digital erledigen</h1><div class="lead">PDF auswählen, unterschreiben und fertigstellen.</div></div></div>
<section class="card screen active" id="choose">
<h2>1. Dokument auswählen</h2>
<div class="types">
<button class="type" data-type="angebot">📄<br><b>Angebot</b></button>
<button class="type" data-type="sepa">🏦<br><b>SEPA-Mandat</b></button>
<button class="type" data-type="vollmacht">✍️<br><b>Vollmacht</b></button>
</div>
<div class="upload"><input id="pdfFile" type="file" accept="application/pdf,.pdf"><div id="fileName"></div></div>
<div class="actions"><button class="btn primary" id="next" disabled>Weiter</button></div>
<div class="status" id="chooseStatus"></div>
</section>
<section class="card screen" id="sign">
<h2>2. Unterschreiben</h2><p class="hint">Mit Finger oder Maus im Feld unterschreiben.</p>
<div class="signbox"><canvas id="signature"></canvas></div>
<div class="actions"><button class="btn danger" id="clear">Löschen</button><button class="btn secondary" id="back">Zurück</button><button class="btn primary" id="create">Fertige PDF erstellen</button></div>
<div class="status" id="signStatus"></div>
</section>
<section class="card screen" id="done">
<h2>✓ Dokument fertig</h2><p class="done">Die PDF wurde erstellt und in Supabase gespeichert.</p>
<div class="actions"><a class="btn primary" id="download">PDF herunterladen</a><button class="btn secondary" id="again">Weiteres Dokument</button></div>
</section>
</main>
<div class="busy" id="busy"><h2>PDF wird erstellt …</h2></div>
<script>
(()=>{
const $=id=>document.getElementById(id),state={type:null,file:null};
const coords={angebot:{page:0,signature:{x:568,y:53,w:120,h:32}},sepa:{page:0,signature:{x:320,y:145,w:200,h:24}},vollmacht:{page:0,signature:{x:320,y:92,w:160,h:30}}};
const canvas=$('signature'),ctx=canvas.getContext('2d');let drawing=false,last=null,hasInk=false;
function show(id){document.querySelectorAll('.screen').forEach(x=>x.classList.remove('active'));$(id).classList.add('active')}
function resize(){const r=canvas.getBoundingClientRect(),d=devicePixelRatio||1;canvas.width=r.width*d;canvas.height=r.height*d;ctx.setTransform(d,0,0,d,0,0);ctx.strokeStyle='#143b2b';ctx.lineWidth=2.7;ctx.lineCap='round';hasInk=false}
function p(e){const r=canvas.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top}}
canvas.addEventListener('pointerdown',e=>{e.preventDefault();drawing=true;last=p(e);hasInk=true});
canvas.addEventListener('pointermove',e=>{if(!drawing)return;e.preventDefault();const q=p(e);ctx.beginPath();ctx.moveTo(last.x,last.y);ctx.lineTo(q.x,q.y);ctx.stroke();last=q});
addEventListener('pointerup',()=>drawing=false);
$('clear').onclick=()=>{ctx.clearRect(0,0,canvas.width,canvas.height);hasInk=false};
document.querySelectorAll('.type').forEach(b=>b.onclick=()=>{state.type=b.dataset.type;document.querySelectorAll('.type').forEach(x=>x.classList.toggle('selected',x===b));$('next').disabled=!(state.type&&state.file)});
$('pdfFile').onchange=e=>{state.file=e.target.files[0]||null;$('fileName').textContent=state.file?state.file.name:'';$('next').disabled=!(state.type&&state.file)};
$('next').onclick=()=>{if(!state.file)return;show('sign');requestAnimationFrame(resize)};
$('back').onclick=()=>show('choose');
function trim(){const w=canvas.width,h=canvas.height,d=ctx.getImageData(0,0,w,h).data;let minX=w,minY=h,maxX=0,maxY=0,found=false;for(let y=0;y<h;y+=2)for(let x=0;x<w;x+=2)if(d[(y*w+x)*4+3]>10){found=true;minX=Math.min(minX,x);maxX=Math.max(maxX,x);minY=Math.min(minY,y);maxY=Math.max(maxY,y)}if(!found)return null;const pad=10,x=Math.max(0,minX-pad),y=Math.max(0,minY-pad),ww=Math.min(w,maxX+pad)-x,hh=Math.min(h,maxY+pad)-y,o=document.createElement('canvas');o.width=ww;o.height=hh;o.getContext('2d').drawImage(canvas,x,y,ww,hh,0,0,ww,hh);return o.toDataURL('image/png')}
async function upload(blob,name){const f=new FormData();f.append('file',blob,name);const r=await fetch('https://yepluyipizbbrgoffqdq.supabase.co/functions/v1/annahme-upload',{method:'POST',body:f});const j=await r.json().catch(()=>({}));if(!r.ok||!j.ok)throw new Error(j.error||'Upload fehlgeschlagen')}
$('create').onclick=async()=>{if(!hasInk){$('signStatus').textContent='Bitte zuerst unterschreiben.';return}if(!window.PDFLib){$('signStatus').textContent='PDF-Bibliothek wurde nicht geladen. Bitte Seite neu laden.';return}$('busy').classList.add('show');$('signStatus').textContent='';try{const input=new Uint8Array(await state.file.arrayBuffer()),pdf=await PDFLib.PDFDocument.load(input,{ignoreEncryption:true}),cfg=coords[state.type],page=pdf.getPage(cfg.page),data=trim(),bytes=Uint8Array.from(atob(data.split(',')[1]),c=>c.charCodeAt(0)),sig=await pdf.embedPng(bytes),dims=sig.scale(1),scale=Math.min(cfg.signature.w/dims.width,cfg.signature.h/dims.height),w=dims.width*scale,h=dims.height*scale;page.drawImage(sig,{x:cfg.signature.x+(cfg.signature.w-w)/2,y:cfg.signature.y,w,h});const out=await pdf.save(),blob=new Blob([out],{type:'application/pdf'}),name=state.file.name.replace(/\.pdf$/i,'')+'-ausgefuellt.pdf';await upload(blob,name);const url=URL.createObjectURL(blob);$('download').href=url;$('download').download=name;show('done')}catch(e){$('signStatus').textContent=e.message||'PDF konnte nicht erstellt werden.'}finally{$('busy').classList.remove('show')}};
$('again').onclick=()=>location.reload();
})();
</script>
</body>
</html>
