name: Install signing app
on:
  push:
    paths:
      - .github/workflows/install-app.yml
permissions:
  contents: write
jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Write application
        run: |
          echo '' | base64 -d | gzip -d > index.html
      - name: Commit application
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m 'Install signing app with Supabase upload' || exit 0
          git push
