name: Vendor PDF library
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  vendor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download PDF library
        run: |
          mkdir -p vendor
          curl -L --fail --retry 3 https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js -o vendor/pdf-lib.min.js
      - name: Use local library
        run: |
          python - <<'PY'
          from pathlib import Path
          p=Path('index.html')
          s=p.read_text()
          s=s.replace('https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js','vendor/pdf-lib.min.js')
          p.write_text(s)
          PY
      - name: Commit files
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add index.html vendor/pdf-lib.min.js
          git commit -m 'Bundle PDF library locally'
          git push
